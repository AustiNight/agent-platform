name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Test
        env:
          DATABASE_URL: "sqlite+aiosqlite:///./test.db"
          REDIS_URL: "redis://localhost:6379/0"
          ANTHROPIC_API_KEY: "sk-ant-placeholder"
          DEFAULT_LLM_MODEL: "claude-sonnet-4-6"
          BROWSER_HEADLESS: "true"
        run: pytest tests/ -v --tb=short

  deploy:
    needs: lint-and-test
    runs-on: ubuntu-latest
    # Only deploy on push to main (not PRs)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy gateway to Railway
        run: curl -fsSL -X POST "${{ secrets.RAILWAY_DEPLOY_HOOK_GATEWAY }}"

      - name: Deploy worker to Railway
        run: curl -fsSL -X POST "${{ secrets.RAILWAY_DEPLOY_HOOK_WORKER }}"
